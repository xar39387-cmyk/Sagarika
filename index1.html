<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Happy Birthday MY LOVE</title>

<style>

body{
margin:0;
overflow:hidden;
font-family:Arial;
text-align:center;
background:linear-gradient(135deg,#ff758c,#ff7eb3);
color:white;
}

/* Password Screen */
#lockScreen {
position: fixed;
top: 0;
left: 0;
width: 100%;
height: 100%;
background: linear-gradient(#ffb6c1, #ffe4e1);
display: flex;
justify-content: center;
align-items: center;
}

.lockBox {
background: white;
padding: 30px;
border-radius: 15px;
text-align: center;
box-shadow: 0 0 15px rgba(0,0,0,0.3);
}

.lockBox h2 {
color: #b22222;
}

.lockBox input {
padding: 10px;
font-size: 18px;
width: 150px;
text-align: center;
}

.lockBox button {
margin-top: 10px;
padding: 8px 20px;
font-size: 16px;
background: #b22222;
color: white;
border: none;
border-radius: 5px;
cursor: pointer;
}

.error {
color: red;
margin-top: 10px;
}

/* Title */

h1{
margin-top:80px;
font-size:45px;
animation:glow 2s infinite alternate;
}

@keyframes glow{
from{text-shadow:0 0 10px white;}
to{text-shadow:0 0 30px yellow;}
}

/* Wishes spacing */

p{
margin-top:40px;
line-height:35px;
font-size:20px;
}

/* GLASS BUTTON */

button{
padding:12px 25px;
font-size:18px;
border-radius:12px;
border:1px solid rgba(255,255,255,0.6);

background:rgba(255,255,255,0.15);
backdrop-filter:blur(10px);
-webkit-backdrop-filter:blur(10px);

color:white;
cursor:pointer;
margin-top:80px;

box-shadow:0 0 15px rgba(255,255,255,0.3);
}

/* Balloon */

.balloon{
width:60px;
height:80px;
border-radius:50%;
position:absolute;
bottom:-120px;
animation:float 10s linear infinite;
}

.balloon:after{
content:"";
width:2px;
height:50px;
background:white;
position:absolute;
left:29px;
top:80px;
}

@keyframes float{
from{transform:translateY(0);}
to{transform:translateY(-120vh);}
}

/* Confetti */

.confetti{
width:8px;
height:8px;
position:absolute;
top:-10px;
animation:fall 5s linear infinite;
}

@keyframes fall{
to{
transform:translateY(120vh) rotate(360deg);
}
}

/* Hearts */

.heart{
position:absolute;
font-size:20px;
animation:heartFall 6s linear infinite;
}

@keyframes heartFall{
from{transform:translateY(-10vh);}
to{transform:translateY(110vh);}
}

/* Firework */

.firework{
position:absolute;
width:6px;
height:6px;
border-radius:50%;
animation:explode 1s ease-out forwards;
}

@keyframes explode{
from{transform:scale(1);}
to{transform:scale(8);opacity:0;}
}

</style>
</head>

<body>

<h1>🎉 HAPPY BIRTHDAY SALI SAHIBA 🎉</h1>

<h3> 😁 Niharikaji nia mo  taraf ru tama birthday ra cake khai dia 😁  </h3>
    <h1>🎂🍰🎂</h1>


<br><br><br>



<script>


/* Balloons */

for(let i=0;i<12;i++){
let b=document.createElement("div");
b.className="balloon";
b.style.left=Math.random()*100+"vw";
b.style.background="hsl("+Math.random()*360+",70%,60%)";
b.style.animationDuration=(6+Math.random()*6)+"s";
document.body.appendChild(b);
}

/* Confetti */

for(let i=0;i<100;i++){
let c=document.createElement("div");
c.className="confetti";
c.style.left=Math.random()*100+"vw";
c.style.background="hsl("+Math.random()*360+",70%,60%)";
c.style.animationDuration=(3+Math.random()*5)+"s";
document.body.appendChild(c);
}

/* PASSWORD */

function checkPassword(){

let pass=document.getElementById("password").value;

if(pass==="626638"){

document.getElementById("lockScreen").style.display="none";

document.getElementById("music").play();

startHearts();
startFireworks();

}else{

document.getElementById("errorMsg").innerHTML="Wrong Password";

}

}

/* Hearts */

function startHearts(){

for(let i=0;i<40;i++){

let h=document.createElement("div");

h.className="heart";

h.innerHTML="❤️";

h.style.left=Math.random()*100+"vw";

h.style.animationDuration=(4+Math.random()*4)+"s";

document.body.appendChild(h);

}

}

/* Fireworks */

function startFireworks(){

setInterval(()=>{

let f=document.createElement("div");

f.className="firework";

f.style.left=Math.random()*100+"vw";

f.style.top=Math.random()*50+"vh";

f.style.background="hsl("+Math.random()*360+",100%,60%)";

document.body.appendChild(f);

setTimeout(()=>{f.remove()},1000);

},500);

}

</script>


</div>
</div>

</body>
</html>
